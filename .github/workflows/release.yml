name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release without a leading v, for example 0.1.1"
        required: true
        type: string

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: macos-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: purcell/setup-emacs@master
        with:
          version: 30.2

      - name: Validate version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          version="${{ inputs.version }}"
          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must look like 0.1.1 without a leading v" >&2
            exit 1
          fi

          tag="v${version}"
          if git rev-parse "${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists locally" >&2
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists on origin" >&2
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Update version files
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          perl -0pi -e 's/;; Version: [0-9]+\.[0-9]+\.[0-9]+/;; Version: $ENV{VERSION}/' org-defuddle.el
          perl -0pi -e 's/\(defconst org-defuddle--module-version "v[0-9]+\.[0-9]+\.[0-9]+"/(defconst org-defuddle--module-version "v$ENV{VERSION}"/' org-defuddle.el
          for manifest in crates/org-defuddle-core/Cargo.toml crates/org-defuddle-cli/Cargo.toml crates/org-defuddle-module/Cargo.toml; do
            perl -0pi -e 's/^version = "[0-9]+\.[0-9]+\.[0-9]+"$/version = "$ENV{VERSION}"/m' "${manifest}"
          done
          cargo check --workspace

      - name: Check out upstream fixtures
        run: |
          git clone --depth 1 https://github.com/kepano/defuddle.git /private/tmp/defuddle-elisp-source
          npm --prefix /private/tmp/defuddle-elisp-source ci
          npm --prefix /private/tmp/defuddle-elisp-source run build:node

      - name: Verify release
        env:
          ORG_DEFUDDLE_DEFUDDLE_DIR: /private/tmp/defuddle-elisp-source
        run: |
          set -euo pipefail
          cargo fmt --all -- --check
          cargo test --workspace
          cargo test -p org-defuddle-core --test upstream_fixtures \
            all_upstream_fixture_content_matches_exact_org_rendering \
            -- --ignored
          cargo build --release -p org-defuddle-module
          cargo build --release -p org-defuddle-cli
          emacs -Q --batch -L . -L test \
            -l test/org-defuddle-test.el \
            -f ert-run-tests-batch-and-exit
          emacs -Q --batch --eval '(byte-compile-file "org-defuddle.el")'

      - name: Commit and tag release
        shell: bash
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add org-defuddle.el Cargo.lock crates/*/Cargo.toml
          if ! git diff --cached --quiet; then
            git commit -m "Release ${TAG}"
            git push origin HEAD:main
          fi
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            module_lib: liborg_defuddle_module.dylib
            module_asset: liborg-defuddle-aarch64-apple-darwin.dylib
            cli_bin: org-defuddle
            cli_asset: org-defuddle-cli-aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
            module_lib: liborg_defuddle_module.dylib
            module_asset: liborg-defuddle-x86_64-apple-darwin.dylib
            cli_bin: org-defuddle
            cli_asset: org-defuddle-cli-x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            module_lib: liborg_defuddle_module.so
            module_asset: liborg-defuddle-x86_64-unknown-linux-gnu.so
            cli_bin: org-defuddle
            cli_asset: org-defuddle-cli-x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            module_lib: liborg_defuddle_module.so
            module_asset: liborg-defuddle-aarch64-unknown-linux-gnu.so
            cli_bin: org-defuddle
            cli_asset: org-defuddle-cli-aarch64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            module_lib: org_defuddle_module.dll
            module_asset: liborg-defuddle-x86_64-pc-windows-msvc.dll
            cli_bin: org-defuddle.exe
            cli_asset: org-defuddle-cli-x86_64-pc-windows-msvc.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release assets
        run: cargo build --release --target ${{ matrix.target }} -p org-defuddle-module -p org-defuddle-cli

      - name: Rename release assets
        shell: bash
        run: |
          cp "target/${{ matrix.target }}/release/${{ matrix.module_lib }}" "${{ matrix.module_asset }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.cli_bin }}" "${{ matrix.cli_asset }}"

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: org-defuddle-${{ matrix.target }}
          path: |
            ${{ matrix.module_asset }}
            ${{ matrix.cli_asset }}

  release:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum * > SHA256SUMS

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          files: artifacts/*
